<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>L.E.P.P.E</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Fredoka One',cursive}
#lw{width:680px;background:#1a0a2e;border-radius:12px;overflow:hidden;position:relative;user-select:none;box-shadow:0 0 60px #5530aa33}
.scr{display:none;flex-direction:column}
.scr.on{display:flex}

/* MENU */
#ms{min-height:560px;background:#1a0a2e;align-items:center;justify-content:center;gap:0}
.mtitle{font-family:'Press Start 2P',monospace;font-size:20px;color:#ffd700;text-align:center;line-height:1.6;text-shadow:0 2px 0 #7a5000;margin-bottom:4px}
.macro{font-size:11px;color:#6644aa;text-align:center;margin-bottom:4px;letter-spacing:.3px;line-height:1.7;max-width:380px;padding:0 20px}
.msub{font-size:11px;color:#554488;letter-spacing:1px;margin-bottom:30px;text-align:center}
.mbtn{display:block;width:260px;padding:13px 0;margin:7px auto;background:#1e0a40;border:2px solid #5530aa;border-radius:10px;color:#ffd700;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;text-align:center;transition:all .15s}
.mbtn:hover{background:#3d1a6e;border-color:#aa80ff;transform:scale(1.02)}
.mbtn.grn{border-color:#3a9000;color:#7fff00}.mbtn.grn:hover{background:#1a4000}
.mbtn.dim{border-color:#443366;color:#9966bb;font-size:12px}.mbtn.dim:hover{background:#2a1050}
#conn{font-size:10px;padding:2px 10px;border-radius:5px;margin-top:14px}
.con-ok{background:#0a2a00;color:#7fff00;border:1px solid #3a7000}
.con-bad{background:#2a0000;color:#ff4444;border:1px solid #7a0000}

/* LOBBY */
#ls{min-height:560px;background:#1a0a2e}
.topbar{background:#0d0420;border-bottom:2px solid #3d1a6e;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.bkbtn{background:#1e0a40;border:1.5px solid #5530aa;color:#aa80ff;padding:5px 13px;border-radius:7px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer}
.bkbtn:hover{background:#3d1a6e}
.bartitle{font-family:'Press Start 2P',monospace;font-size:10px;color:#ffd700;flex:1;text-align:center}
.lbody{display:flex;height:500px}
.lcol{width:270px;border-right:2px solid #3d1a6e;display:flex;flex-direction:column;flex-shrink:0}
.lcolhdr{padding:9px 13px;background:#0d0228;border-bottom:1px solid #3d1a6e;display:flex;justify-content:space-between;align-items:center}
.lcolhdr span{font-size:11px;color:#9966cc}
.crbtn{background:#280858;border:1.5px solid #6040b0;color:#cc99ff;padding:4px 10px;border-radius:7px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer}
.crbtn:hover{background:#4a1a80}
.litems{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:5px}
.litem{background:#160a2c;border:1.5px solid #3d1a6e;border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .15s}
.litem:hover{border-color:#7040c0;background:#221040}
.litem.sel{border-color:#ffd700;background:#1e1400}
.liname{font-size:13px;color:#e0c0ff;margin-bottom:3px}
.limeta{font-size:10px;color:#665588;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.lct{color:#ffd700}
.badge{padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700}
.bwait{background:#1a3800;color:#7fff00}.bfull{background:#3a0a00;color:#ff6666}.bplay{background:#001a3a;color:#00aaff}
.ldet{flex:1;display:flex;flex-direction:column;background:#0f0326}
.lempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:#3d2a5a;font-size:12px}
.dtop{padding:13px 15px;border-bottom:1px solid #3d1a6e;flex-shrink:0}
.dname{font-size:16px;color:#ffd700;margin-bottom:2px}
.dmeta{font-size:10px;color:#665588}
.nrow{padding:8px 13px;background:#0d0225;border-bottom:1px solid #3d1a6e;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ninp{background:#1a0838;border:1.5px solid #5530aa;color:#e0c0ff;padding:5px 10px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:12px;flex:1}
.ninp:focus{outline:none;border-color:#aa80ff}
.teams{display:flex;flex:1;overflow:hidden}
.tc{flex:1;padding:10px 12px;border-right:1px solid #3d1a6e;display:flex;flex-direction:column;overflow-y:auto}
.tc:last-child{border-right:none}
.tlbl{font-size:12px;font-weight:700;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.rl{color:#ff4d6d}.bl{color:#00e5ff}
.jbtn{font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:'Fredoka One',cursive;border:1.5px solid;background:transparent;transition:all .15s}
.jr{border-color:#ff4d6d;color:#ff4d6d}.jr:hover{background:#3d0a1e}
.jb{border-color:#00e5ff;color:#00e5ff}.jb:hover{background:#003344}
.pslot{background:#180a30;border:1.5px dashed #3d1a6e;border-radius:7px;padding:7px 10px;margin-bottom:6px;display:flex;align-items:center;gap:7px;min-height:38px}
.pslot.filled{border-style:solid;border-color:#5530aa}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sname{font-size:12px;color:#e0c0ff;flex:1}
.syou{font-size:9px;color:#ffd700}
.sempty{font-size:10px;color:#4a3a6a;font-style:italic}
.dfooter{padding:10px 13px;border-top:1px solid #3d1a6e;display:flex;gap:7px;align-items:center;flex-shrink:0}
.startbtn{flex:1;background:#1a4000;border:2px solid #3a9000;color:#7fff00;padding:10px 0;border-radius:9px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:all .15s}
.startbtn:hover:not(:disabled){background:#2a6000}
.startbtn:disabled{opacity:.35;cursor:not-allowed}
.lvbtn{background:#3a0a00;border:1.5px solid #aa2200;color:#ff6666;padding:8px 12px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer}
.lvbtn:hover{background:#5a1500}
.delbtn{background:#220033;border:1.5px solid #770099;color:#cc44ff;padding:8px 12px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer}
.delbtn:hover{background:#440055}

/* GAME */
#gs{background:#1a0a2e}
.ghud{background:#0d0420;border-bottom:2px solid #3d1a6e;padding:6px 13px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative}
.phud{display:flex;align-items:center;gap:6px}
.pnm{font-size:11px;font-weight:700}
.rn{color:#ff4d6d}.bn{color:#00e5ff}
.hpr{display:flex;gap:3px}
.hpp{width:12px;height:12px;border-radius:3px;transition:background .2s}
.mhud{text-align:center}
.sc{font-family:'Press Start 2P',monospace;font-size:12px;color:#ffd700}
.tm{font-size:10px;color:#7755aa;margin-top:1px}
.menubtn{background:#1e0a40;border:1.5px solid #5530aa;color:#aa80ff;padding:4px 10px;border-radius:6px;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;position:absolute;right:10px;top:6px}
.menubtn:hover{background:#3d1a6e}
canvas{display:block}
.gfoot{background:#0d0420;border-top:1px solid #3d1a6e;padding:4px 13px;display:flex;gap:5px;align-items:center;min-height:22px;flex-shrink:0}
.pp{font-size:9px;padding:2px 6px;border-radius:7px;font-weight:700}
.pspd{background:#1a4a00;color:#7fff00}.pshd{background:#003366;color:#00e5ff}.pgrv{background:#330066;color:#d580ff}.pmlt{background:#4a3000;color:#ffd700}
#galert{position:absolute;left:50%;top:48px;transform:translateX(-50%);background:#5500aa;color:#d580ff;padding:4px 15px;border-radius:8px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}

/* END */
#eover{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,0,20,.9);z-index:30}
#eover.on{display:flex}
#etitle{font-family:'Press Start 2P',monospace;font-size:20px;color:#ffd700;text-align:center;margin-bottom:10px}
#esub{color:#aa80ff;font-size:13px;margin-bottom:22px}
.ebtns{display:flex;gap:10px}
.ebtn{background:#1e0a40;border:2px solid #5530aa;color:#ffd700;padding:10px 20px;border-radius:10px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer}
.ebtn:hover{background:#3d1a6e}

/* CREATE MODAL */
#cmodal{display:none;position:absolute;inset:0;background:rgba(4,0,16,.85);z-index:50;align-items:center;justify-content:center}
#cmodal.on{display:flex}
.mbox{background:#130430;border:2px solid #5530aa;border-radius:14px;padding:24px;width:300px}
.mttl{font-family:'Press Start 2P',monospace;font-size:11px;color:#ffd700;margin-bottom:16px;text-align:center}
.mlbl{font-size:12px;color:#aa80ff;margin-bottom:5px;display:block}
.minp{width:100%;background:#1a0838;border:1.5px solid #5530aa;color:#e0c0ff;padding:8px 11px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:13px;margin-bottom:13px}
.minp:focus{outline:none;border-color:#aa80ff}
.mrow{display:flex;gap:8px;margin-top:2px}
.mcan{flex:1;background:transparent;border:1.5px solid #442266;color:#9966bb;padding:9px 0;border-radius:8px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer}
.mcan:hover{background:#2a1050}
.mok{flex:1;background:#1a4000;border:1.5px solid #3a9000;color:#7fff00;padding:9px 0;border-radius:8px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer}
.mok:hover{background:#2a6000}

/* TOAST */
#toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:#1a0838;border:1.5px solid #5530aa;color:#e0c0ff;padding:7px 16px;border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:60}
</style>
</head>
<body>
<div id="lw">

<!-- MENU -->
<div id="ms" class="scr on">
  <div class="mtitle">L.E.P.P.E</div>
  <div class="macro">
    <b style="color:#ffd700">L</b>eprechaun&nbsp;
    <b style="color:#ff8fa3">E</b>pic&nbsp;
    <b style="color:#7fff00">P</b>hysics&nbsp;&amp;&nbsp;
    <b style="color:#80ffff">P</b>rojectiles&nbsp;
    <b style="color:#d580ff">E</b>mulator
  </div>
  <div class="msub">3v3 dodgeball chaos — friendly fire ON</div>
  <button class="mbtn grn" onclick="showLobby()">PLAY ONLINE (3v3)</button>
  <button class="mbtn" onclick="startLocal()">LOCAL 1v1</button>
  <div id="conn" class="con-bad">OFFLINE</div>
</div>

<!-- LOBBY -->
<div id="ls" class="scr">
  <div class="topbar">
    <button class="bkbtn" onclick="leaveThenMenu()">← BACK</button>
    <div class="bartitle">LEPPE LOBBIES</div>
    <span style="font-size:9px;color:#554477">3v3 DODGEBALL</span>
  </div>
  <div class="lbody">
    <div class="lcol">
      <div class="lcolhdr"><span>OPEN LOBBIES</span><button class="crbtn" onclick="openCreate()">+ CREATE</button></div>
      <div class="litems" id="litems"><div style="color:#443366;font-size:11px;padding:12px;text-align:center">Connecting…</div></div>
    </div>
    <div class="ldet" id="ldet">
      <div class="lempty"><div style="font-size:30px;color:#3d2a5a">&#9752;</div><div>Select a lobby</div><div style="font-size:10px;color:#4a3a6a">or create your own</div></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gs" class="scr">
  <div class="ghud">
    <div class="phud" style="margin-left:10px"><span class="pnm rn">RED</span><div class="hpr" id="hp1"></div></div>
    <div class="mhud"><div class="sc"><span id="rs">0</span> — <span id="bs">0</span></div><div class="tm" id="tmr">90s</div></div>
    <div class="phud" style="flex-direction:row-reverse; margin-right:60px"><span class="pnm bn">BLU</span><div class="hpr" id="hp2"></div></div>
    <button class="menubtn" onclick="leaveMatch()">&#9776; MENU</button>
  </div>
  <canvas id="gc" width="680" height="380"></canvas>
  <div class="gfoot"><span style="font-size:9px;color:#443366">POWER-UPS: </span><span id="pupl"></span></div>
  <div id="galert">&#9889; GRAVITY FLIPPED!</div>
</div>

<!-- END -->
<div id="eover">
  <div id="etitle">DRAW!</div>
  <div id="esub">Match ended</div>
  <div class="ebtns"><button class="ebtn" onclick="leaveThenMenu()">BACK TO MENU</button></div>
</div>

</div>
<script>
// HUD setup example
function createHealthBars() {
  const hp1 = document.getElementById('hp1');
  const hp2 = document.getElementById('hp2');
  for (let i = 0; i < 10; i++) {
    const div1 = document.createElement('div');
    div1.className = 'hpp';
    div1.style.background = '#ff4d6d';
    hp1.appendChild(div1);

    const div2 = document.createElement('div');
    div2.className = 'hpp';
    div2.style.background = '#00e5ff';
    hp2.appendChild(div2);
  }
}
createHealthBars();
</script>
</body>
</html>
