<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>L.E.P.P.E</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Fredoka One',cursive}
#lw{width:680px;background:#1a0a2e;border-radius:12px;overflow:hidden;position:relative;user-select:none;box-shadow:0 0 60px #5530aa33}
.scr{display:none;flex-direction:column}
.scr.on{display:flex}

/* MENU */
#ms{min-height:560px;background:#1a0a2e;align-items:center;justify-content:center;gap:0}
.mtitle{font-family:'Press Start 2P',monospace;font-size:20px;color:#ffd700;text-align:center;line-height:1.6;text-shadow:0 2px 0 #7a5000;margin-bottom:4px}
.macro{font-size:11px;color:#6644aa;text-align:center;margin-bottom:4px;letter-spacing:.3px;line-height:1.7;max-width:380px;padding:0 20px}
.msub{font-size:11px;color:#554488;letter-spacing:1px;margin-bottom:30px;text-align:center}
.mbtn{display:block;width:260px;padding:13px 0;margin:7px auto;background:#1e0a40;border:2px solid #5530aa;border-radius:10px;color:#ffd700;font-family:'Fredoka One',cursive;font-size:16px;cursor:pointer;text-align:center;transition:all .15s}
.mbtn:hover{background:#3d1a6e;border-color:#aa80ff;transform:scale(1.02)}
.mbtn.grn{border-color:#3a9000;color:#7fff00}.mbtn.grn:hover{background:#1a4000}
.mbtn.dim{border-color:#443366;color:#9966bb;font-size:12px}.mbtn.dim:hover{background:#2a1050}
#conn{font-size:10px;padding:2px 10px;border-radius:5px;margin-top:14px}
.con-ok{background:#0a2a00;color:#7fff00;border:1px solid #3a7000}
.con-bad{background:#2a0000;color:#ff4444;border:1px solid #7a0000}

/* LOBBY */
#ls{min-height:560px;background:#1a0a2e}
.topbar{background:#0d0420;border-bottom:2px solid #3d1a6e;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.bkbtn{background:#1e0a40;border:1.5px solid #5530aa;color:#aa80ff;padding:5px 13px;border-radius:7px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer}
.bkbtn:hover{background:#3d1a6e}
.bartitle{font-family:'Press Start 2P',monospace;font-size:10px;color:#ffd700;flex:1;text-align:center}
.lbody{display:flex;height:500px}
.lcol{width:270px;border-right:2px solid #3d1a6e;display:flex;flex-direction:column;flex-shrink:0}
.lcolhdr{padding:9px 13px;background:#0d0228;border-bottom:1px solid #3d1a6e;display:flex;justify-content:space-between;align-items:center}
.lcolhdr span{font-size:11px;color:#9966cc}
.crbtn{background:#280858;border:1.5px solid #6040b0;color:#cc99ff;padding:4px 10px;border-radius:7px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer}
.crbtn:hover{background:#4a1a80}
.litems{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:5px}
.litem{background:#160a2c;border:1.5px solid #3d1a6e;border-radius:9px;padding:9px 12px;cursor:pointer;transition:all .15s}
.litem:hover{border-color:#7040c0;background:#221040}
.litem.sel{border-color:#ffd700;background:#1e1400}
.liname{font-size:13px;color:#e0c0ff;margin-bottom:3px}
.limeta{font-size:10px;color:#665588;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.lct{color:#ffd700}
.badge{padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700}
.bwait{background:#1a3800;color:#7fff00}.bfull{background:#3a0a00;color:#ff6666}.bplay{background:#001a3a;color:#00aaff}
.ldet{flex:1;display:flex;flex-direction:column;background:#0f0326}
.lempty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:#3d2a5a;font-size:12px}
.dtop{padding:13px 15px;border-bottom:1px solid #3d1a6e;flex-shrink:0}
.dname{font-size:16px;color:#ffd700;margin-bottom:2px}
.dmeta{font-size:10px;color:#665588}
.nrow{padding:8px 13px;background:#0d0225;border-bottom:1px solid #3d1a6e;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ninp{background:#1a0838;border:1.5px solid #5530aa;color:#e0c0ff;padding:5px 10px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:12px;flex:1}
.ninp:focus{outline:none;border-color:#aa80ff}
.teams{display:flex;flex:1;overflow:hidden}
.tc{flex:1;padding:10px 12px;border-right:1px solid #3d1a6e;display:flex;flex-direction:column;overflow-y:auto}
.tc:last-child{border-right:none}
.tlbl{font-size:12px;font-weight:700;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center}
.rl{color:#ff4d6d}.bl{color:#00e5ff}
.jbtn{font-size:11px;padding:3px 9px;border-radius:6px;cursor:pointer;font-family:'Fredoka One',cursive;border:1.5px solid;background:transparent;transition:all .15s}
.jr{border-color:#ff4d6d;color:#ff4d6d}.jr:hover{background:#3d0a1e}
.jb{border-color:#00e5ff;color:#00e5ff}.jb:hover{background:#003344}
.pslot{background:#180a30;border:1.5px dashed #3d1a6e;border-radius:7px;padding:7px 10px;margin-bottom:6px;display:flex;align-items:center;gap:7px;min-height:38px}
.pslot.filled{border-style:solid;border-color:#5530aa}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sname{font-size:12px;color:#e0c0ff;flex:1}
.syou{font-size:9px;color:#ffd700}
.sempty{font-size:10px;color:#4a3a6a;font-style:italic}
.dfooter{padding:10px 13px;border-top:1px solid #3d1a6e;display:flex;gap:7px;align-items:center;flex-shrink:0}
.startbtn{flex:1;background:#1a4000;border:2px solid #3a9000;color:#7fff00;padding:10px 0;border-radius:9px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer;transition:all .15s}
.startbtn:hover:not(:disabled){background:#2a6000}
.startbtn:disabled{opacity:.35;cursor:not-allowed}
.lvbtn{background:#3a0a00;border:1.5px solid #aa2200;color:#ff6666;padding:8px 12px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer}
.lvbtn:hover{background:#5a1500}
.delbtn{background:#220033;border:1.5px solid #770099;color:#cc44ff;padding:8px 12px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer}
.delbtn:hover{background:#440055}

/* GAME */
#gs{background:#1a0a2e}
.ghud{background:#0d0420;border-bottom:2px solid #3d1a6e;padding:6px 13px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:relative}
.phud{display:flex;align-items:center;gap:6px}
.pnm{font-size:11px;font-weight:700}
.rn{color:#ff4d6d}.bn{color:#00e5ff}
.hpr{display:flex;gap:3px}
.hpp{width:12px;height:12px;border-radius:3px;transition:background .2s}
.mhud{text-align:center}
.sc{font-family:'Press Start 2P',monospace;font-size:12px;color:#ffd700}
.tm{font-size:10px;color:#7755aa;margin-top:1px}
.menubtn{background:#1e0a40;border:1.5px solid #5530aa;color:#aa80ff;padding:4px 10px;border-radius:6px;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;position:absolute;right:10px;top:6px}
.menubtn:hover{background:#3d1a6e}
canvas{display:block}
.gfoot{background:#0d0420;border-top:1px solid #3d1a6e;padding:4px 13px;display:flex;gap:5px;align-items:center;min-height:22px;flex-shrink:0}
.pp{font-size:9px;padding:2px 6px;border-radius:7px;font-weight:700}
.pspd{background:#1a4a00;color:#7fff00}.pshd{background:#003366;color:#00e5ff}.pgrv{background:#330066;color:#d580ff}.pmlt{background:#4a3000;color:#ffd700}
#galert{position:absolute;left:50%;top:48px;transform:translateX(-50%);background:#5500aa;color:#d580ff;padding:4px 15px;border-radius:8px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap}

/* END */
#eover{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,0,20,.9);z-index:30}
#eover.on{display:flex}
#etitle{font-family:'Press Start 2P',monospace;font-size:20px;color:#ffd700;text-align:center;margin-bottom:10px}
#esub{color:#aa80ff;font-size:13px;margin-bottom:22px}
.ebtns{display:flex;gap:10px}
.ebtn{background:#1e0a40;border:2px solid #5530aa;color:#ffd700;padding:10px 20px;border-radius:10px;font-family:'Fredoka One',cursive;font-size:14px;cursor:pointer}
.ebtn:hover{background:#3d1a6e}

/* CREATE MODAL */
#cmodal{display:none;position:absolute;inset:0;background:rgba(4,0,16,.85);z-index:50;align-items:center;justify-content:center}
#cmodal.on{display:flex}
.mbox{background:#130430;border:2px solid #5530aa;border-radius:14px;padding:24px;width:300px}
.mttl{font-family:'Press Start 2P',monospace;font-size:11px;color:#ffd700;margin-bottom:16px;text-align:center}
.mlbl{font-size:12px;color:#aa80ff;margin-bottom:5px;display:block}
.minp{width:100%;background:#1a0838;border:1.5px solid #5530aa;color:#e0c0ff;padding:8px 11px;border-radius:8px;font-family:'Fredoka One',cursive;font-size:13px;margin-bottom:13px}
.minp:focus{outline:none;border-color:#aa80ff}
.mrow{display:flex;gap:8px;margin-top:2px}
.mcan{flex:1;background:transparent;border:1.5px solid #442266;color:#9966bb;padding:9px 0;border-radius:8px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer}
.mcan:hover{background:#2a1050}
.mok{flex:1;background:#1a4000;border:1.5px solid #3a9000;color:#7fff00;padding:9px 0;border-radius:8px;font-family:'Fredoka One',cursive;font-size:13px;cursor:pointer}
.mok:hover{background:#2a6000}

/* TOAST */
#toast{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:#1a0838;border:1.5px solid #5530aa;color:#e0c0ff;padding:7px 16px;border-radius:8px;font-size:12px;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;z-index:60}
</style>
</head>
<body>
<div id="lw">

<!-- MENU -->
<div id="ms" class="scr on">
  <div class="mtitle">L.E.P.P.E</div>
  <div class="macro">
    <b style="color:#ffd700">L</b>eprechaun&nbsp;
    <b style="color:#ff8fa3">E</b>pic&nbsp;
    <b style="color:#7fff00">P</b>hysics&nbsp;&amp;&nbsp;
    <b style="color:#80ffff">P</b>rojectiles&nbsp;
    <b style="color:#d580ff">E</b>mulator
  </div>
  <div class="msub">3v3 dodgeball chaos — friendly fire ON</div>
  <button class="mbtn grn" onclick="showLobby()">PLAY ONLINE (3v3)</button>
  <button class="mbtn" onclick="startLocal()">LOCAL 1v1</button>
  <div id="conn" class="con-bad">OFFLINE</div>
</div>

<!-- LOBBY -->
<div id="ls" class="scr">
  <div class="topbar">
    <button class="bkbtn" onclick="leaveThenMenu()">← BACK</button>
    <div class="bartitle">LEPPE LOBBIES</div>
    <span style="font-size:9px;color:#554477">3v3 DODGEBALL</span>
  </div>
  <div class="lbody">
    <div class="lcol">
      <div class="lcolhdr"><span>OPEN LOBBIES</span><button class="crbtn" onclick="openCreate()">+ CREATE</button></div>
      <div class="litems" id="litems"><div style="color:#443366;font-size:11px;padding:12px;text-align:center">Connecting…</div></div>
    </div>
    <div class="ldet" id="ldet">
      <div class="lempty"><div style="font-size:30px;color:#3d2a5a">&#9752;</div><div>Select a lobby</div><div style="font-size:10px;color:#4a3a6a">or create your own</div></div>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gs" class="scr">
  <div class="ghud">
    <div class="phud"><span class="pnm rn">RED</span><div class="hpr" id="hp1"></div></div>
    <div class="mhud"><div class="sc"><span id="rs">0</span> — <span id="bs">0</span></div><div class="tm" id="tmr">90s</div></div>
    <div class="phud" style="flex-direction:row-reverse"><span class="pnm bn">BLUE</span><div class="hpr" id="hp2"></div></div>
    <button class="menubtn" onclick="leaveMatch()">&#9776; MENU</button>
  </div>
  <canvas id="gc" width="680" height="380"></canvas>
  <div class="gfoot"><span style="font-size:9px;color:#443366">POWER-UPS: </span><span id="pupl"></span></div>
  <div id="galert">&#9889; GRAVITY FLIPPED!</div>
</div>

<!-- END -->
<div id="eover">
  <div id="etitle">DRAW!</div>
  <div id="esub">Equal chaos.</div>
  <div class="ebtns">
    <button class="ebtn" onclick="startLocal()">PLAY AGAIN</button>
    <button class="ebtn" onclick="leaveThenMenu()">MENU</button>
  </div>
</div>

<!-- CREATE MODAL -->
<div id="cmodal">
  <div class="mbox">
    <div class="mttl">CREATE LOBBY</div>
    <label class="mlbl">Lobby Name</label>
    <input class="minp" id="lname" placeholder="e.g. Paddy's Arena" maxlength="28">
    <label class="mlbl">Password (optional)</label>
    <input class="minp" id="lpass" placeholder="Leave blank = public" maxlength="20">
    <div class="mrow">
      <button class="mcan" onclick="closeCreate()">CANCEL</button>
      <button class="mok"  onclick="doCreate()">CREATE</button>
    </div>
  </div>
</div>

<div id="toast"></div>
</div>

<script>
// ═══════════════════════════════════
// CANVAS + CONSTANTS
// ═══════════════════════════════════
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const W=680, H=380, MX=340;

// ═══════════════════════════════════
// SOCKET
// ═══════════════════════════════════
const socket = io();
let mySid=null, myName=localStorage.getItem('lname')||'Leppie'+Math.floor(Math.random()*999);
let inLobbyId=null, myTeam=null, selLobbyId=null, isHost=false;
let currentLobby=null;

socket.on('connect',    ()=>{ setConn(true);  socket.emit('set_name',{name:myName}); socket.emit('get_lobbies'); });
socket.on('disconnect', ()=>setConn(false));
socket.on('hello',      d=>{ mySid=d.sid; });
socket.on('lobby_list', list=>renderLobbyList(list));
socket.on('lobby_update', lb=>{ if(lb.id===inLobbyId||lb.id===selLobbyId){ currentLobby=lb; renderDetail(lb); } });
socket.on('lobby_deleted', ()=>{ inLobbyId=null; myTeam=null; currentLobby=null; leaveThenMenu(); toast('Lobby was deleted'); });
socket.on('joined',  d=>{ inLobbyId=d.lobby.id; myTeam=d.team; isHost=d.lobby.host===d.sid; currentLobby=d.lobby; selLobbyId=d.lobby.id; renderDetail(d.lobby); });
socket.on('left',    ()=>{ inLobbyId=null; myTeam=null; isHost=false; currentLobby=null; });
socket.on('err',     d=>toast(d.msg,true));
socket.on('game_start', ()=>{ stopLocal(); showScr('gs'); resetGameState(); onlineMode=true; requestAnimationFrame(onlineLoop); });
socket.on('state',   d=>applyState(d));
socket.on('game_over',d=>{ onlineMode=false; gRunning=false; showEnd(d.winner,d.red,d.blue); });
socket.on('grav_flip',d=>{ gravDir=d.dir; showGravAlert(); });

function setConn(ok){
  const el=document.getElementById('conn');
  el.textContent=ok?'ONLINE':'OFFLINE';
  el.className=ok?'con-ok':'con-bad';
}
function showLobby(){ showScr('ls'); socket.emit('get_lobbies'); }
function leaveThenMenu(){
  if(gRunning||onlineMode){ stopLocal(); onlineMode=false; gRunning=false; }
  if(inLobbyId) socket.emit('leave_lobby');
  showScr('ms');
  document.getElementById('eover').style.display='none';
}
function leaveMatch(){
  if(inLobbyId) socket.emit('leave_lobby');
  stopLocal(); onlineMode=false; gRunning=false;
  showScr('ms');
}
function openCreate(){ document.getElementById('cmodal').classList.add('on'); }
function closeCreate(){ document.getElementById('cmodal').classList.remove('on'); }
function doCreate(){
  const n=document.getElementById('lname').value.trim()||'Arena';
  const pw=document.getElementById('lpass').value.trim();
  socket.emit('create_lobby',{name:n,password:pw});
  closeCreate();
}

// ═══════════════════════════════════
// LOBBY UI
// ═══════════════════════════════════
function renderLobbyList(list){
  const el=document.getElementById('litems'); el.innerHTML='';
  if(!list.length){ el.innerHTML='<div style="color:#443366;font-size:11px;padding:12px;text-align:center">No lobbies yet. Create one!</div>'; return; }
  list.forEach(lb=>{
    const tot=lb.red.length+lb.blue.length;
    const full=lb.red.length>=lb.max&&lb.blue.length>=lb.max;
    const d=document.createElement('div');
    d.className='litem'+(selLobbyId===lb.id?' sel':'');
    d.innerHTML=`<div class="liname">${esc(lb.name)}</div>
      <div class="limeta">
        <span class="lct">${tot}/${lb.max*2}</span>
        <span>host: ${esc(lb.host_name)}</span>
        <span class="badge ${lb.state==='ingame'?'bplay':full?'bfull':'bwait'}">${lb.state==='ingame'?'IN GAME':full?'FULL':'WAITING'}</span>
        ${lb.locked?'<span class="badge" style="background:#1a0a30;color:#aa88cc">&#128274;</span>':''}
      </div>`;
    d.onclick=()=>{ selLobbyId=lb.id; socket.emit('get_lobbies'); renderDetail(lb); };
    el.appendChild(d);
  });
}

function renderDetail(lb){
  if(!lb){ document.getElementById('ldet').innerHTML='<div class="lempty"><div style="font-size:30px;color:#3d2a5a">&#9752;</div><div>Select a lobby</div></div>'; return; }
  const inThis=inLobbyId===lb.id;
  const amHost=inThis&&lb.host===mySid;
  const canStart=amHost&&lb.red.length>=1&&lb.blue.length>=1;

  const slotHTML=(arr,teamKey,cls,jcls,jfn)=>{
    let h=`<div class="tc"><div class="tlbl"><span class="${cls}">${teamKey==='red'?'RED TEAM':'BLUE TEAM'}</span>
      <button class="jbtn ${jcls}" onclick="${jfn}">JOIN</button></div>`;
    for(let i=0;i<lb.max;i++){
      const p=arr[i];
      if(p){ const me=p.sid===mySid;
        h+=`<div class="pslot filled">
          <div class="av" style="background:${teamKey==='red'?'#3d0a1e':'#003344'};color:${teamKey==='red'?'#ff8fa3':'#66ffff'}">${esc(p.name)[0]}</div>
          <span class="sname">${esc(p.name)}</span>${me?'<span class="syou">YOU</span>':''}
        </div>`;
      } else h+=`<div class="pslot"><span class="sempty">open slot</span></div>`;
    }
    h+=`</div>`; return h;
  };

  document.getElementById('ldet').innerHTML=`
    <div class="dtop"><div class="dname">${esc(lb.name)}</div><div class="dmeta">ID: ${lb.id} · host: ${esc(lb.host_name)}</div></div>
    <div class="nrow">
      <span style="font-size:11px;color:#7755aa;white-space:nowrap">Your name:</span>
      <input class="ninp" id="ninp" value="${esc(myName)}" oninput="updName(this.value)" maxlength="16" placeholder="Name…">
    </div>
    <div class="teams">
      ${slotHTML(lb.red,'red','rl','jr',`joinTeam('${lb.id}','red')`)}
      ${slotHTML(lb.blue,'blue','bl','jb',`joinTeam('${lb.id}','blue')`)}
    </div>
    <div class="dfooter">
      <button class="startbtn" ${canStart?'':'disabled'} onclick="socket.emit('start_game')">
        ${amHost?(canStart?'START GAME':'Need 1+ per team'):(inThis?'Waiting for host…':'Join a team first')}
      </button>
      ${inThis?`<button class="lvbtn" onclick="socket.emit('leave_lobby')">LEAVE</button>`:''}
      ${amHost?`<button class="delbtn" onclick="socket.emit('delete_lobby')" title="Delete lobby">&#128465;</button>`:''}
    </div>`;
}

function joinTeam(lid,team){
  const n=document.getElementById('ninp')?.value.trim();
  if(n){ myName=n; updName(n); }
  if(inLobbyId===lid){ socket.emit('switch_team',{team}); }
  else{
    const pw = currentLobby?.locked ? (prompt('Password:')||'') : '';
    socket.emit('join_lobby',{id:lid,team,password:pw});
  }
}
function updName(v){ myName=v; localStorage.setItem('lname',v); socket.emit('set_name',{name:v}); }

// ═══════════════════════════════════
// GAME STATE
// ═══════════════════════════════════
let gRunning=false, onlineMode=false, gAF=null;
let gravDir=1, gravFlip=0, gravAlert=0;
let gameTimer=90, gTick=0, ballTick=0, pupTick=0;
let p1,p2,balls=[],powerups=[],particles=[];
let s1=0,s2=0;
// Online: server state + local trail/particle tracking
let serverState=null;
let ballTrails={};   // id -> [{x,y}]
let localParts=[];   // client-side particles (hit effects, trampolines)

const PLATS=[
  {x:0,  y:370,w:680,h:14,mov:false,mx:0, bx:0,  t:0},
  {x:80, y:290,w:120,h:12,mov:false,mx:0, bx:80, t:0},
  {x:480,y:290,w:120,h:12,mov:false,mx:0, bx:480,t:0},
  {x:270,y:240,w:140,h:12,mov:true, mx:60,bx:270,t:0},
  {x:120,y:180,w:100,h:12,mov:false,mx:0, bx:120,t:0},
  {x:460,y:180,w:100,h:12,mov:false,mx:0, bx:460,t:0},
  {x:280,y:130,w:120,h:12,mov:false,mx:0, bx:280,t:0},
];
const TRAMPS=[{x:50,y:356,w:40,h:8,t:0},{x:590,y:356,w:40,h:8,t:0}];

function mkP(x,isP1){ return{x,y:200,vx:0,vy:0,w:28,h:38,onG:false,hp:5,maxHp:5,isP1,alive:true,spawn:0,shield:0,speed:0,multi:0,facing:isP1?1:-1,legA:0,hatB:0,throwCD:0}; }
function mkB(x,y,vx,vy,own,type){ return{id:Math.random().toString(36).slice(2),x,y,vx,vy,r:7,own,type,life:320,bounces:0,trail:[]}; }
function mkPup(x,y,type){ return{x,y,r:12,type,life:600,bob:0}; }
function mkPt(x,y,vx,vy,col,life){ return{x,y,vx,vy,col,life,ml:life,r:3}; }

function resetGameState(){
  gravDir=1; gravFlip=0; gravAlert=0; gameTimer=90; gTick=0; ballTick=0; pupTick=0;
  s1=0; s2=0; balls=[]; powerups=[]; particles=[]; serverState=null;
  ballTrails={}; localParts=[];
  document.getElementById('eover').style.display='none';
  document.getElementById('galert').style.opacity='0';
}

// ═══════════════════════════════════
// INPUT
// ═══════════════════════════════════
const keys={};
document.addEventListener('keydown',e=>{ keys[e.code]=true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault(); });
document.addEventListener('keyup',  e=>{ keys[e.code]=false; });

// Online input send 60fps
setInterval(()=>{
  if(!onlineMode||!inLobbyId) return;
  const t = !!keys['KeyF'];
  socket.emit('input',{i:{l:!!keys['KeyA'],r:!!keys['KeyD'],u:!!keys['KeyW'],t}});
  if(t) keys['KeyF']=false;
},16);

// ═══════════════════════════════════
// ONLINE — apply server state + render
// ═══════════════════════════════════
function applyState(g){
  serverState=g;
  document.getElementById('rs').textContent=g.rs;
  document.getElementById('bs').textContent=g.bs;
  document.getElementById('tmr').textContent=g.timer+'s';
  gravDir=g.grav;

  // Update ball trails on client
  const seen=new Set();
  g.balls.forEach(b=>{
    seen.add(b.id);
    if(!ballTrails[b.id]) ballTrails[b.id]=[];
    ballTrails[b.id].push({x:b.x,y:b.y});
    if(ballTrails[b.id].length>8) ballTrails[b.id].shift();
  });
  Object.keys(ballTrails).forEach(id=>{ if(!seen.has(id)) delete ballTrails[id]; });

  updateHUDOnline(g);
}

function onlineLoop(){
  if(!onlineMode) return;
  if(serverState){
    // age particles
    localParts=localParts.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.life--; return p.life>0; });
    TRAMPS.forEach(t=>t.t+=.06);
    drawOnline();
  }
  requestAnimationFrame(onlineLoop);
}

function drawOnline(){
  const g=serverState;
  const plats=g.platforms||PLATS;
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawMid();
  TRAMPS.forEach(tr=>drawTramp(tr));
  plats.forEach(pl=>drawPlat(pl));
  drawPupsArr(g.powerups||[]);
  drawBallsOnline(g.balls||[]);
  drawParticles(localParts);
  Object.values(g.players||{}).forEach(p=>{
    if(p.alive) drawLep(p);
    else if(p.spawn_timer>0) drawRespawnNamed(p);
  });
}

function drawBallsOnline(bArr){
  bArr.forEach(b=>{
    const trail=ballTrails[b.id]||[];
    drawOneBall(b,trail);
  });
}

// ═══════════════════════════════════
// LOCAL 1v1
// ═══════════════════════════════════
function startLocal(){
  document.getElementById('eover').style.display='none';
  showScr('gs'); resetGameState();
  p1=mkP(100,true); p2=mkP(540,false);
  gRunning=true; onlineMode=false;
  PLATS.forEach(pl=>{pl.x=pl.bx;pl.t=0;});
  TRAMPS.forEach(t=>t.t=0);
  if(gAF) cancelAnimationFrame(gAF);
  localLoop();
}
function stopLocal(){ gRunning=false; if(gAF){cancelAnimationFrame(gAF);gAF=null;} }

function showScr(id){ document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on')); document.getElementById(id).classList.add('on'); }

function localLoop(){
  if(!gRunning||onlineMode) return;
  localTick();
  drawLocal();
  gAF=requestAnimationFrame(localLoop);
}

function localTick(){
  gTick++;
  if(gTick%60===0){ gameTimer--; document.getElementById('tmr').textContent=gameTimer+'s'; if(gameTimer<=0){showEnd(s1>s2?'red':s2>s1?'blue':'draw',s1,s2);return;} }
  if(gravFlip>0){ gravFlip--; if(gravFlip===0)gravDir=1; }
  if(gravAlert>0){ gravAlert--; document.getElementById('galert').style.opacity=gravAlert>0?'1':'0'; }
  ballTick++; pupTick++;
  if(ballTick%80===0&&balls.length<16) spawnBall();
  if(pupTick%350===0&&powerups.length<4) spawnPup();
  PLATS.forEach(pl=>{ if(pl.mov){pl.t+=.02;pl.x=pl.bx+Math.sin(pl.t)*pl.mx;} });
  TRAMPS.forEach(t=>t.t+=.06);
  updP(p1,'KeyA','KeyD','KeyW','KeyF');
  updP(p2,'ArrowLeft','ArrowRight','ArrowUp','KeyL');
  updBalls();
  particles=particles.filter(pt=>{ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=.1; pt.life--; return pt.life>0; });
  powerups=powerups.filter(pu=>{ pu.life--; pu.bob+=.08; return pu.life>0; });
  checkPups();
  updHUDLocal();
}

function updP(p,L,R,U,TH){
  if(!p.alive){ if(p.spawn>0){ p.spawn--; if(p.spawn===0){p.alive=true;p.hp=p.maxHp;p.x=p.isP1?100:540;p.y=100;p.vx=0;p.vy=0;} } return; }
  const spd=2.8*(p.speed>0?1.6:1);
  if(keys[L]){p.vx=Math.max(p.vx-.4,-spd);p.facing=-1;}
  else if(keys[R]){p.vx=Math.min(p.vx+.4,spd);p.facing=1;}
  else p.vx*=.82;
  p.vy+=.35*gravDir;
  p.x+=p.vx; p.y+=p.vy; p.onG=false;
  PLATS.forEach(pl=>{
    const inX=p.x+p.w>pl.x&&p.x<pl.x+pl.w;
    if(!inX)return;
    if(gravDir===1&&p.vy>=0&&p.y+p.h>pl.y&&p.y+p.h<pl.y+pl.h+16){p.y=pl.y-p.h;p.vy=0;p.onG=true;}
    else if(gravDir===-1&&p.vy<=0&&p.y<pl.y+pl.h&&p.y>pl.y-16){p.y=pl.y+pl.h;p.vy=0;p.onG=true;}
  });
  TRAMPS.forEach(tr=>{
    const inX=p.x+p.w>tr.x&&p.x<tr.x+tr.w;
    if(gravDir===1&&p.y+p.h>tr.y&&p.y+p.h<tr.y+20&&inX){
      p.vy=-16;p.onG=false;
      for(let i=0;i<8;i++)particles.push(mkPt(tr.x+tr.w/2,tr.y,(Math.random()-.5)*4,-Math.random()*3,'#7fff00',28));
    }
  });
  const bnd=p.isP1?[0,MX-p.w]:[MX,W-p.w];
  p.x=Math.max(bnd[0],Math.min(bnd[1],p.x));
  if((gravDir===1&&p.y>H+50)||(gravDir===-1&&p.y<-50)){p.y=100;p.vy=0;}
  if(keys[U]&&p.onG){p.vy=-9.5*gravDir;p.onG=false;}
  p.legA+=Math.abs(p.vx)*.15; p.hatB=Math.sin(Date.now()*.01)*2;
  if(p.throwCD>0)p.throwCD--;
  if(p.speed>0)p.speed--;
  if(keys[TH]&&p.throwCD===0){
    p.throwCD=22;
    const cnt=p.multi>0?2:1; if(p.multi>0)p.multi--;
    const types=['normal','normal','normal','explosive','split'];
    for(let i=0;i<cnt;i++){
      const t=types[Math.floor(Math.random()*types.length)];
      balls.push(mkB(p.x+(p.facing>0?p.w:0),p.y+p.h*.4,p.facing*12+(i?(Math.random()-.5)*3:0),-3+(i?(Math.random()-.5)*2:0),p.isP1?'p1':'p2',t));
    }
    keys[TH]=false;
  }
}

function spawnBall(){
  const types=['normal','normal','normal','explosive','split'];
  balls.push(mkB(60+Math.random()*(W-120),20,(Math.random()-.5)*4,-3-Math.random()*5,'none',types[Math.floor(Math.random()*types.length)]));
}
function spawnPup(){
  const types=['speed','shield','gravity','multi'];
  powerups.push(mkPup(60+Math.random()*(W-120),40+Math.random()*280,types[Math.floor(Math.random()*types.length)]));
}
function checkPups(){
  powerups=powerups.filter(pu=>{
    let taken=false;
    [p1,p2].forEach(p=>{
      if(!p.alive)return;
      const dx=(p.x+p.w/2)-pu.x,dy=(p.y+p.h/2)-pu.y;
      if(Math.sqrt(dx*dx+dy*dy)<pu.r+p.w/2){ applyPupLocal(p,pu.type); for(let i=0;i<12;i++)particles.push(mkPt(pu.x,pu.y,(Math.random()-.5)*6,(Math.random()-.5)*6,'#ffd700',28)); taken=true; }
    });
    return !taken;
  });
}
function applyPupLocal(p,type){
  if(type==='speed')p.speed=180;
  else if(type==='shield')p.shield+=2;
  else if(type==='gravity'){gravDir*=-1;gravFlip=200;gravAlert=60;document.getElementById('galert').style.opacity='1';}
  else if(type==='multi')p.multi=3;
}
function updBalls(){
  const kill=new Set();
  balls.forEach((b,bi)=>{
    if(kill.has(bi))return;
    b.trail.push({x:b.x,y:b.y}); if(b.trail.length>8)b.trail.shift();
    b.vx*=.995; b.vy+=.32*gravDir; b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0){kill.add(bi);return;}
    PLATS.forEach(pl=>{
      const inX=b.x+b.r>pl.x&&b.x-b.r<pl.x+pl.w;
      if(gravDir===1&&b.vy>0&&b.y+b.r>pl.y&&b.y-b.r<pl.y+12&&inX){b.y=pl.y-b.r;b.vy*=-.62;b.vx*=.9;b.bounces++;}
      else if(gravDir===-1&&b.vy<0&&b.y-b.r<pl.y+pl.h&&b.y+b.r>pl.y&&inX){b.y=pl.y+pl.h+b.r;b.vy*=-.62;b.vx*=.9;b.bounces++;}
    });
    TRAMPS.forEach(tr=>{const inX=b.x+b.r>tr.x&&b.x-b.r<tr.x+tr.w;if(b.y+b.r>tr.y&&b.y-b.r<tr.y+10&&inX){b.vy*=-1.5;b.bounces++;}});
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);b.bounces++;}
    if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);b.bounces++;}
    if(gravDir===1&&b.y+b.r>H){b.y=H-b.r;b.vy*=-.5;b.bounces++;}
    if(gravDir===-1&&b.y-b.r<0){b.y=b.r;b.vy*=-.5;b.bounces++;}
    if(b.bounces>8&&b.type==='explosive'){localExplode(b);kill.add(bi);return;}
    if(b.bounces>14){kill.add(bi);return;}
    [p1,p2].forEach(p=>{
      if(!p.alive||kill.has(bi))return;
      const cx=p.x+p.w/2,cy=p.y+p.h/2;
      if(Math.abs(b.x-cx)<p.w/2+b.r&&Math.abs(b.y-cy)<p.h/2+b.r){
        if(b.type==='split'){localSplit(b);kill.add(bi);}
        else if(b.type==='explosive'){localExplode(b);kill.add(bi);}
        else{localHit(p,b);for(let i=0;i<6;i++)particles.push(mkPt(b.x,b.y,(Math.random()-.5)*5,(Math.random()-.5)*5,'#fff',18));kill.add(bi);}
      }
    });
  });
  balls=balls.filter((_,i)=>!kill.has(i));
}
function localHit(p,b){
  if(p.shield>0){p.shield--;for(let i=0;i<8;i++)particles.push(mkPt(p.x+p.w/2,p.y+p.h/2,(Math.random()-.5)*5,(Math.random()-.5)*5,p.isP1?'#ff8fa3':'#66ffff',22));return;}
  p.hp--;p.vx+=b?b.vx*.3:0;p.vy-=3;
  for(let i=0;i<8;i++)particles.push(mkPt(p.x+p.w/2,p.y+p.h/2,(Math.random()-.5)*6,(Math.random()-.5)*6,p.isP1?'#ff4d6d':'#00e5ff',30));
  if(p.hp<=0){
    p.alive=false;p.spawn=150;
    if(p.isP1)s2++;else s1++;
    for(let i=0;i<20;i++)particles.push(mkPt(p.x+p.w/2,p.y+p.h/2,(Math.random()-.5)*9,(Math.random()-.5)*9,p.isP1?'#ff4d6d':'#00e5ff',55));
  }
}
function localExplode(b){
  for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;particles.push(mkPt(b.x,b.y,Math.cos(a)*sp,Math.sin(a)*sp,'#ff6600',42));}
  [p1,p2].forEach(p=>{if(!p.alive)return;const dx=(p.x+p.w/2)-b.x,dy=(p.y+p.h/2)-b.y;if(Math.sqrt(dx*dx+dy*dy)<70)localHit(p,b);});
}
function localSplit(b){
  const sp=Math.hypot(b.vx,b.vy)*.8,ba=Math.atan2(b.vy,b.vx);
  for(let i=0;i<3;i++){const a=ba+(Math.PI*2/3)*i;const nb=mkB(b.x,b.y,Math.cos(a)*sp,Math.sin(a)*sp,b.own,'normal');nb.r=5;nb.life=120;balls.push(nb);}
  for(let i=0;i<8;i++)particles.push(mkPt(b.x,b.y,(Math.random()-.5)*5,(Math.random()-.5)*5,'#7fff00',18));
}

// ═══════════════════════════════════
// HUD
// ═══════════════════════════════════
function updHUDLocal(){
  document.getElementById('rs').textContent=s1;
  document.getElementById('bs').textContent=s2;
  mkhp(document.getElementById('hp1'),p1.maxHp,p1.alive?p1.hp:0,'#ff4d6d','#330011');
  mkhp(document.getElementById('hp2'),p2.maxHp,p2.alive?p2.hp:0,'#00e5ff','#001133');
  const pups=[];
  [p1,p2].forEach(p=>{const t=p.isP1?'P1':'P2';if(p.speed>0)pups.push(`<span class="pp pspd">${t} SPD</span>`);if(p.shield>0)pups.push(`<span class="pp pshd">${t} SHD×${p.shield}</span>`);if(p.multi>0)pups.push(`<span class="pp pmlt">${t} MLT×${p.multi}</span>`);});
  if(gravDir===-1)pups.push('<span class="pp pgrv">GRAV FLIP</span>');
  document.getElementById('pupl').innerHTML=pups.join(' ');
}
function updHUDOnline(g){
  const pArr=Object.values(g.players||{});
  const red=pArr.filter(p=>p.team==='red');
  const blue=pArr.filter(p=>p.team==='blue');
  const rHp=document.getElementById('hp1'); rHp.innerHTML='';
  const bHp=document.getElementById('hp2'); bHp.innerHTML='';
  red.forEach(p=>mkhpEl(rHp,p.max_hp,p.alive?p.hp:0,'#ff4d6d','#330011'));
  blue.forEach(p=>mkhpEl(bHp,p.max_hp,p.alive?p.hp:0,'#00e5ff','#001133'));
  const pups=[];
  pArr.forEach(p=>{const t=p.team==='red'?'RED':'BLU';if(p.speed>0)pups.push(`<span class="pp pspd">${t} SPD</span>`);if(p.shield>0)pups.push(`<span class="pp pshd">${t} SHD×${p.shield}</span>`);if(p.multi>0)pups.push(`<span class="pp pmlt">${t} MLT×${p.multi}</span>`);});
  if(g.grav===-1)pups.push('<span class="pp pgrv">GRAV FLIP</span>');
  document.getElementById('pupl').innerHTML=pups.join(' ');
}
function mkhp(el,max,cur,on,off){ el.innerHTML=''; for(let i=0;i<max;i++){const d=document.createElement('div');d.className='hpp';d.style.background=i<cur?on:off;el.appendChild(d);} }
function mkhpEl(el,max,cur,on,off){ for(let i=0;i<max;i++){const d=document.createElement('div');d.className='hpp';d.style.background=i<cur?on:off;el.appendChild(d);} }

function showEnd(winner,rs,bs){
  const ov=document.getElementById('eover'); ov.style.display='flex';
  document.getElementById('etitle').textContent=winner==='red'?'RED WINS!':winner==='blue'?'BLUE WINS!':'DRAW!';
  document.getElementById('esub').textContent=`Score: Red ${rs} — Blue ${bs}`;
  ov.querySelector('.ebtns').innerHTML=onlineMode
    ?`<button class="ebtn" onclick="showLobby()">LOBBIES</button><button class="ebtn" onclick="leaveThenMenu()">MENU</button>`
    :`<button class="ebtn" onclick="startLocal()">PLAY AGAIN</button><button class="ebtn" onclick="leaveThenMenu()">MENU</button>`;
}
function showGravAlert(){ const el=document.getElementById('galert');el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2200); }

// ═══════════════════════════════════
// DRAW — exact v4 functions
// ═══════════════════════════════════
function drawLocal(){
  ctx.clearRect(0,0,W,H);
  drawBg(); drawMid();
  TRAMPS.forEach(tr=>drawTramp(tr));
  PLATS.forEach(pl=>drawPlat(pl));
  drawPupsArr(powerups);
  balls.forEach(b=>drawOneBall(b,b.trail));
  drawParticles(particles);
  if(p1.alive)drawLep(p1); if(p2.alive)drawLep(p2);
  if(!p1.alive&&p1.spawn>0)drawRespawn(p1);
  if(!p2.alive&&p2.spawn>0)drawRespawn(p2);
}

function drawBg(){
  ctx.fillStyle='#1a0a2e';ctx.fillRect(0,0,W,H);
  if(gravDir===-1){ctx.fillStyle='rgba(140,0,255,.06)';ctx.fillRect(0,0,W,H);}
  ctx.fillStyle='rgba(255,255,255,.025)';
  for(let i=0;i<20;i++)ctx.fillRect((i*113+37)%W,(i*79+11)%H,1,1);
}
function drawMid(){
  ctx.fillStyle='rgba(255,80,80,.07)';ctx.fillRect(0,0,MX,H);
  ctx.fillStyle='rgba(80,160,255,.07)';ctx.fillRect(MX,0,MX,H);
  ctx.fillStyle='rgba(255,80,80,.18)';ctx.fillRect(0,H-14,MX,14);
  ctx.fillStyle='rgba(80,160,255,.18)';ctx.fillRect(MX,H-14,MX,14);
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(MX,0);ctx.lineTo(MX,H);ctx.stroke();ctx.setLineDash([]);ctx.restore();
}
function drawPlat(pl){
  ctx.fillStyle='#2d1060';ctx.beginPath();ctx.roundRect(pl.x,pl.y,pl.w,pl.h,4);ctx.fill();
  ctx.strokeStyle='#7040c0';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='rgba(180,120,255,.3)';ctx.fillRect(pl.x+4,pl.y+1,pl.w-8,2);
}
function drawTramp(tr){
  const b=Math.sin(tr.t)*2;
  ctx.fillStyle='#005500';ctx.beginPath();ctx.roundRect(tr.x,tr.y+b,tr.w,tr.h,3);ctx.fill();
  ctx.strokeStyle='#00ff66';ctx.lineWidth=2;ctx.stroke();
}
function drawPupsArr(arr){
  const pc={speed:'#7fff00',shield:'#00e5ff',gravity:'#d580ff',multi:'#ffd700'};
  const pi={speed:'SPD',shield:'SHD',gravity:'GRV',multi:'MLT'};
  arr.forEach(pu=>{
    const by=pu.y+Math.sin(pu.bob||0)*5,c=pc[pu.type];
    ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(pu.x,by,pu.r||12,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=c+'22';ctx.beginPath();ctx.arc(pu.x,by,pu.r||12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c;ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pi[pu.type],pu.x,by);
  });
}
function drawOneBall(b,trail){
  if(trail&&trail.length>1){
    ctx.save();ctx.globalAlpha=.28;
    ctx.strokeStyle=b.type==='explosive'?'#ff6600':b.type==='split'?'#7fff00':b.owner==='p1'||b.own==='p1'?'#ffaa00':b.owner==='p2'||b.own==='p2'?'#ff4dff':'#aaaaff';
    ctx.lineWidth=(b.r||7)*1.4;ctx.lineCap='round';ctx.beginPath();
    trail.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y));ctx.stroke();ctx.restore();
  }
  const own=b.owner||b.own||'none';
  const col=b.type==='explosive'?'#ff6600':b.type==='split'?'#7fff00':own==='p1'||own==='red'?'#ffaa00':own==='p2'||own==='blue'?'#ff4dff':'#88aaff';
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(b.x,b.y,b.r||7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.45)';ctx.beginPath();ctx.arc(b.x-(b.r||7)*.3,b.y-(b.r||7)*.3,(b.r||7)*.33,0,Math.PI*2);ctx.fill();
  if(b.type==='explosive'){ctx.strokeStyle='#ff3300';ctx.lineWidth=1.5;ctx.setLineDash([2,2]);ctx.beginPath();ctx.arc(b.x,b.y,(b.r||7)+2+Math.sin(Date.now()*.04)*2,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);}
  if(own==='none'){ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(b.x,b.y,(b.r||7)+2,0,Math.PI*2);ctx.stroke();}
}
function drawParticles(arr){
  arr.forEach(pt=>{ctx.globalAlpha=pt.life/pt.ml;ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*(pt.life/pt.ml),0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
}

// THE ONE AND ONLY drawLep — exact v4, untouched
function drawLep(p){
  // Support both local (isP1) and online (team) player objects
  const isRed = p.isP1 !== undefined ? p.isP1 : p.team==='red';
  const col   = isRed ? '#ff4d6d' : '#00e5ff';
  const x     = p.x, y = p.y;
  const pw=p.w||28, ph=p.h||38;
  const cx    = x + pw/2;
  const shield= p.shield||0;
  // animation — use legA/hatB if present (local), else derive from vx for online
  const legA  = p.legA  !== undefined ? p.legA  : (p._legA  = ((p._legA||0) + Math.abs(p.vx||0)*.15));
  const hatB  = p.hatB  !== undefined ? p.hatB  : Math.sin(Date.now()*.01)*2;
  const facing= p.facing||1;

  ctx.save();
  // shield bubble
  if(shield>0){
    ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.globalAlpha=.45+Math.sin(Date.now()*.012)*.3;
    ctx.beginPath();ctx.arc(cx,y+ph/2,pw*.88,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }
  // legs
  const l1=Math.sin(legA)*8, l2=-Math.sin(legA)*8;
  ctx.strokeStyle=col;ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx,y+ph-10);ctx.lineTo(cx-5,y+ph+l1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,y+ph-10);ctx.lineTo(cx+5,y+ph+l2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-5,y+ph+l1);ctx.lineTo(cx-8,y+ph+l1+5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+5,y+ph+l2);ctx.lineTo(cx+8,y+ph+l2+5);ctx.stroke();
  // body
  ctx.fillStyle=isRed?'#cc2244':'#0088aa';
  ctx.beginPath();ctx.roundRect(x+3,y+12,pw-6,ph-20,4);ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.stroke();
  // arms
  const a1=Math.sin(legA+Math.PI)*6;
  ctx.strokeStyle=col;ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x+4,y+18);ctx.lineTo(x-3,y+24+a1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x+pw-4,y+18);ctx.lineTo(x+pw+3,y+24-a1);ctx.stroke();
  // head
  const hy=y+10+hatB;
  ctx.fillStyle=isRed?'#ff8899':'#66ffff';
  ctx.beginPath();ctx.arc(cx,hy,9,0,Math.PI*2);ctx.fill();
  // eye
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(cx+facing*3,hy-1,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx+facing*3+1,hy-2,.8,0,Math.PI*2);ctx.fill();
  // hat
  ctx.fillStyle=isRed?'#008800':'#006666';
  ctx.fillRect(cx-8,hy-21,16,14);
  ctx.fillRect(cx-11,hy-8,22,3);
  ctx.fillStyle='#ffd700';
  ctx.fillRect(cx-8,hy-13,16,3);
  // clover
  ctx.fillStyle='#00cc44';ctx.font='9px sans-serif';ctx.textAlign='center';
  ctx.fillText('🍀',cx,hy-14);
  // name tag for online players
  if(p.name){
    ctx.fillStyle='rgba(255,255,255,.45)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
    ctx.fillText(p.name,cx,y-5);
  }
  ctx.restore();
}

function drawRespawn(p){
  const isRed=p.isP1!==undefined?p.isP1:p.team==='red';
  ctx.fillStyle=isRed?'#ff4d6d':'#00e5ff';ctx.globalAlpha=.55;
  ctx.font='bold 12px Fredoka One,sans-serif';ctx.textAlign='center';
  ctx.fillText('RESPAWN '+Math.ceil(p.spawn/60)+'s',isRed?MX/2:MX+MX/2,H/2);
  ctx.globalAlpha=1;
}
function drawRespawnNamed(p){
  ctx.fillStyle=p.team==='red'?'#ff4d6d':'#00e5ff';ctx.globalAlpha=.55;
  ctx.font='bold 12px Fredoka One,sans-serif';ctx.textAlign='center';
  const x=p.team==='red'?MX/2:MX+MX/2;
  ctx.fillText((p.name||'?')+' RESPAWN '+Math.ceil(p.spawn_timer/60)+'s',x,H/2);
  ctx.globalAlpha=1;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.borderColor=err?'#aa2200':'#5530aa';
  el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2600);
}
